<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Base64 Redirect</title>
</head>
<body>
<script>
const params = new URLSearchParams(window.location.search);
const encoded = params.get("url");

if (encoded) {
    try {
        const decoded = atob(encoded);
        window.location.replace(decoded);
    } catch (e) {
        document.body.textContent = "Invalid Base64 string.";
    }
} else {
    document.body.textContent = "No URL provided.";
}
</script>
</body>
</html>
